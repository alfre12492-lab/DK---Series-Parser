<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK Series Parser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --bg2: #181c24; --bg3: #1f2330;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0f2f5; --muted: #8a8f9e;
    --accent: #f0b429; --accent2: #e09010;
    --green: #2ecc71; --red: #e74c3c;
    --radius: 10px; --radius-sm: 6px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; position: relative; overflow-x: hidden; }

  .bg-field {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 1200px 1200px at 50% 100%, rgba(80,150,70,0.55) 0%, rgba(80,150,70,0.32) 50%, transparent 80%),
      var(--bg);
  }
  .field-lines {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 1400px; height: 1400px; z-index: 0; pointer-events: none;
    opacity: 1;
  }

  header, .main { position: relative; z-index: 1; }

  header { padding: 1.25rem 2rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #1a1a1a; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 600; }
  header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .main { max-width: 680px; margin: 0 auto; padding: 1.5rem; }

  .step-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 8px; }
  textarea {
    width: 100%; min-height: 150px; resize: vertical;
    background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: var(--radius); color: var(--text);
    font-family: monospace; font-size: 12px;
    padding: 12px 14px; line-height: 1.6;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .hint b { color: var(--accent); font-weight: 500; }

  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn { padding: 9px 20px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg3); color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
  .btn:hover { background: var(--bg2); }
  .btn.parse { background: var(--accent); color: #1a1a1a; border-color: var(--accent2); font-weight: 700; }
  .btn.parse:hover { background: var(--accent2); }

  hr { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }

  .output { display: none; }
  .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .badge { font-size: 12px; color: var(--muted); background: var(--bg3); border: 0.5px solid var(--border); padding: 3px 10px; border-radius: 20px; }

  .games-list { display: flex; flex-direction: column; gap: 8px; }
  .game-card {
    background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    transition: border-color 0.15s;
  }
  .game-card:hover { border-color: rgba(255,255,255,0.22); }
  .game-teams { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .team-row { display: flex; align-items: center; justify-content: space-between; }
  .team-name { font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; transition: background 0.15s, color 0.15s; }
  .team-name:hover { background: var(--bg3); color: var(--accent); }
  .team-name.copied { color: var(--green); }
  .odd { font-family: monospace; font-weight: 700; font-size: 14px; min-width: 52px; text-align: right; }
  .odd.pos { color: var(--green); }
  .odd.neg { color: var(--red); }
  .divider-line { height: 0.5px; background: var(--border); margin: 2px 0; }
  .copy-btn {
    background: none; border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); padding: 6px 12px;
    font-size: 11px; color: var(--muted); cursor: pointer;
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-copy-all { background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text); }
  .btn-copy-all:hover { border-color: var(--accent); color: var(--accent); }
  .empty { text-align: center; padding: 2rem; color: var(--muted); font-size: 13px; background: var(--bg2); border-radius: var(--radius); }
</style>
</head>
<body>

<div class="bg-field"></div>
<svg class="field-lines" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <path d="M500 950 L80 530 A 593 593 0 0 1 920 530 Z" fill="rgba(80,150,70,0.32)" stroke="rgba(80,150,70,0.6)" stroke-width="3"/>
  <line x1="500" y1="950" x2="80" y2="530" stroke="rgba(240,240,230,0.55)" stroke-width="4"/>
  <line x1="500" y1="950" x2="920" y2="530" stroke="rgba(240,240,230,0.55)" stroke-width="4"/>
  <rect x="468" y="800" width="64" height="64" fill="rgba(240,240,230,0.5)" stroke="rgba(240,240,230,0.65)" stroke-width="2" transform="rotate(45 500 832)"/>
  <rect x="270" y="600" width="40" height="40" fill="rgba(240,240,230,0.45)" stroke="rgba(240,240,230,0.6)" stroke-width="2" transform="rotate(45 290 620)"/>
  <rect x="690" y="600" width="40" height="40" fill="rgba(240,240,230,0.45)" stroke="rgba(240,240,230,0.6)" stroke-width="2" transform="rotate(45 710 620)"/>
  <rect x="480" y="450" width="40" height="40" fill="rgba(240,240,230,0.45)" stroke="rgba(240,240,230,0.6)" stroke-width="2" transform="rotate(45 500 470)"/>
  <circle cx="500" cy="680" r="55" fill="rgba(190,90,55,0.38)" stroke="rgba(190,90,55,0.55)" stroke-width="2"/>
  <circle cx="500" cy="680" r="6" fill="rgba(240,240,230,0.6)"/>
</svg>

<header>
  <div class="logo">DK</div>
  <div>
    <h1>DK Series Parser</h1>
    <p>Paste DraftKings text — extracts Series Prices automatically</p>
  </div>
</header>

<div class="main">
  <div class="step-label">1 — Paste DraftKings text</div>
  <textarea id="input" placeholder="Open DraftKings on Series Props → Series Winner, press Ctrl+A, Ctrl+C, then paste here with Ctrl+V."></textarea>
  <p class="hint">Works with the full <b>Ctrl+A</b> text. Only extracts Series Prices — ignores everything else.</p>
  <div class="btn-row">
    <button class="btn parse" onclick="parse()">⚡ Parse</button>
    <button class="btn" onclick="clearAll()">↺ Clear</button>
  </div>

  <hr>

  <div class="output" id="output">
    <div class="output-header">
      <div class="step-label" style="margin:0;">2 — Results</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="badge" id="count-badge">0 series</span>
        <button class="btn btn-copy-all" onclick="copyAll()">Copy all</button>
      </div>
    </div>
    <div class="games-list" id="games-list"></div>
  </div>
</div>

<script>
const TEAMS = {
  'MIA':'Miami Marlins','PIT':'Pittsburgh Pirates','SEA':'Seattle Mariners',
  'WAS':'Washington Nationals','WSH':'Washington Nationals','SDP':'San Diego Padres',
  'SD':'San Diego Padres','BAL':'Baltimore Orioles','TEX':'Texas Rangers',
  'BOS':'Boston Red Sox','ARI':'Arizona Diamondbacks','CIN':'Cincinnati Reds',
  'ATL':'Atlanta Braves','NYM':'New York Mets','DET':'Detroit Tigers',
  'CLE':'Cleveland Guardians','NYY':'New York Yankees','TOR':'Toronto Blue Jays',
  'LAD':'Los Angeles Dodgers','CWS':'Chicago White Sox','PHI':'Philadelphia Phillies',
  'MIL':'Milwaukee Brewers','HOU':'Houston Astros','KCR':'Kansas City Royals',
  'KC':'Kansas City Royals','STL':'St. Louis Cardinals','MIN':'Minnesota Twins',
  'TBR':'Tampa Bay Rays','TB':'Tampa Bay Rays','LAA':'Los Angeles Angels',
  'COL':'Colorado Rockies','ATH':'Oakland Athletics','OAK':'Oakland Athletics',
  'CHC':'Chicago Cubs','SFG':'San Francisco Giants','SF':'San Francisco Giants',
  'WSN':'Washington Nationals',
};

function resolveTeam(raw) {
  if (!raw) return raw;
  const up = raw.trim().toUpperCase();
  if (TEAMS[up]) return TEAMS[up];
  for (const [k, v] of Object.entries(TEAMS)) {
    if (up === k) return v;
  }
  return raw.trim();
}

function oddClass(o) { return o && o.startsWith('+') ? 'pos' : 'neg'; }

function parse() {
  const text = document.getElementById('input').value;
  if (!text.trim()) return;
  const games = [];

  const headerRx = /([A-Z]{2,4})\s+at\s+([A-Z]{2,4})\s+-\s+Series Winner([\s\S]*?)(?=[A-Z]{2,4}\s+at\s+[A-Z]{2,4}\s+-\s+Series Winner|MLB Betting|$)/g;
  let m;
  while ((m = headerRx.exec(text)) !== null) {
    const awayAbbr = m[1];
    const homeAbbr = m[2];
    const block = m[3];
    const odds = [...block.matchAll(/([−\-+]\d{3,4})/g)].map(x => x[1].replace('−','-'));
    games.push({
      away: resolveTeam(awayAbbr),
      home: resolveTeam(homeAbbr),
      mlHome: odds[0] || '—',
      mlAway: odds[1] || '—',
    });
  }

  if (games.length === 0) {
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    for (let i = 0; i < lines.length; i++) {
      const oddMatch = lines[i].match(/^([−\-+]\d{3,4})$/);
      if (oddMatch && i >= 1) {
        const tm = lines[i-1].match(/^([A-Z]{2,4})\s+(.+)$/);
        if (tm && i+2 < lines.length) {
          const odd2Match = lines[i+2].match(/^([−\-+]\d{3,4})$/);
          const tm2 = lines[i+1].match(/^([A-Z]{2,4})\s+(.+)$/);
          if (tm2 && odd2Match) {
            games.push({
              home: resolveTeam(tm[1]),
              away: resolveTeam(tm2[1]),
              mlHome: oddMatch[1].replace('−','-'),
              mlAway: odd2Match[1].replace('−','-'),
            });
            i += 2;
          }
        }
      }
    }
  }

  renderResults(games);
}

function renderResults(games) {
  const list = document.getElementById('games-list');
  const output = document.getElementById('output');
  list.innerHTML = '';
  document.getElementById('count-badge').textContent = games.length + (games.length !== 1 ? ' series' : ' series');

  if (games.length === 0) {
    list.innerHTML = '<div class="empty">No series found. Make sure to copy the "Series Winner" section from DraftKings.</div>';
    output.style.display = 'block';
    return;
  }

  games.forEach((g) => {
    const copyText = `${g.away} ${g.mlAway}\n${g.home} ${g.mlHome}`;
    const card = document.createElement('div');
    card.className = 'game-card';
    card.dataset.text = copyText;
    card.innerHTML = `
      <div class="game-teams">
        <div class="team-row">
          <span class="team-name" onclick="copyTeam(this, '${g.away.replace(/'/g, "\\'")}')">${g.away}</span>
          <span class="odd ${oddClass(g.mlAway)}">${g.mlAway}</span>
        </div>
        <div class="divider-line"></div>
        <div class="team-row">
          <span class="team-name" onclick="copyTeam(this, '${g.home.replace(/'/g, "\\'")}')">${g.home}</span>
          <span class="odd ${oddClass(g.mlHome)}">${g.mlHome}</span>
        </div>
      </div>
      <button class="copy-btn" onclick="copyCard(this)">Copy</button>
    `;
    list.appendChild(card);
  });

  output.style.display = 'block';
}

function copyTeam(span, name) {
  navigator.clipboard.writeText(name).then(() => {
    const original = span.textContent;
    span.textContent = '✓ Copied';
    span.classList.add('copied');
    setTimeout(() => {
      span.textContent = original;
      span.classList.remove('copied');
    }, 1000);
  });
}

function copyCard(btn) {
  const text = btn.closest('.game-card').dataset.text;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

function copyAll() {
  const cards = document.querySelectorAll('.game-card[data-text]');
  const text = Array.from(cards).map(c => c.dataset.text).join('\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy-all');
    btn.textContent = '✓ All copied!';
    setTimeout(() => btn.textContent = 'Copy all', 2000);
  });
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('output').style.display = 'none';
}
</script>
</body>
</html>
